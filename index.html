<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smitle</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Title -->
    <h1>Smitle</h1>

    <!-- Input container, uses a container to position the dropdown list correctly relative to the input field -->
    <div class="autocomplete-container">

        <!-- Main input, uses an input field for the user to type their guess. -->
        <input type="text" id="guessInput" placeholder="Search for a God" autocomplete="off">

        <!-- Dropdown list (we fill this dynamically) -->
        <div id="autocompleteList" class="autocomplete-items"></div>

    </div>

    <button onclick="submitGuess()">Guess</button>

    <!-- Table to display guesses -->
    <table id="resultsTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Gender</th>
                <th>Pantheon</th>
                <th>Role</th>
                <th>Range</th>
            </tr>
        </thead>
        <tbody>
            <!-- Rows will be added dynamically -->
        </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
