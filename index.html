<body>

    <div class="game-container">

        <h1>Smite Guess Game</h1>

        <!-- INPUT AREA -->
        <div class="autocomplete-container">
            <input type="text" id="guessInput" placeholder="Guess a god..." autocomplete="off">
            <div id="autocompleteList" class="autocomplete-items"></div>
        </div>

        <button onclick="submitGuess()">Guess</button>

        <!-- RESULTS GRID -->
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Gender</th>
                    <th>Pantheon</th>
                    <th>Role</th>
                    <th>Range</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>

    <script src="script.js"></script>
</body>
