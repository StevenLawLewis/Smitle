<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smite Guess Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Guess the Smite God</h1>

    <!-- Input container (needed for dropdown positioning) -->
    <div class="autocomplete-container">

        <!-- Main input -->
        <input type="text" id="guessInput" placeholder="Enter a god name" autocomplete="off">

        <!-- Dropdown list (we fill this dynamically) -->
        <div id="autocompleteList" class="autocomplete-items"></div>

    </div>

    <button onclick="submitGuess()">Guess</button>

    <!-- Table to display guesses -->
    <table id="resultsTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Gender</th>
                <th>Pantheon</th>
                <th>Role</th>
                <th>Range</th>
            </tr>
        </thead>
        <tbody>
            <!-- Rows will be added dynamically -->
        </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
